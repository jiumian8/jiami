<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAS 高安全媒体加解密工具</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 40px; color: #333; }
        .container { max-width: 800px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        h1 { text-align: center; color: #2c3e50; font-size: 24px; margin-top: 0; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #555; }
        input[type="text"], input[type="password"] { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        .btn-group { display: flex; gap: 15px; margin-top: 30px; }
        button { flex: 1; padding: 14px; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: all 0.2s; color: #fff; }
        .btn-encrypt { background-color: #e74c3c; }
        .btn-encrypt:hover { background-color: #c0392b; }
        .btn-decrypt { background-color: #2ecc71; }
        .btn-decrypt:hover { background-color: #27ae60; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        
        /* 彩色动画进度条 */
        .progress-container { width: 100%; background-color: #e0e0e0; border-radius: 8px; margin-top: 30px; overflow: hidden; display: none; height: 24px; position: relative; }
        .progress-bar { height: 100%; width: 0%; border-radius: 8px; transition: width 0.2s ease;
            background: linear-gradient(90deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            background-size: 200% 200%;
            animation: gradientMove 2s ease infinite;
        }
        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .progress-text { position: absolute; width: 100%; text-align: center; top: 3px; font-size: 13px; font-weight: bold; color: #333; z-index: 2; }
        
        /* 终端日志样式 */
        .log-container { background-color: #1e1e1e; color: #00ff00; font-family: "Courier New", Courier, monospace; padding: 15px; border-radius: 8px; height: 300px; overflow-y: auto; margin-top: 20px; font-size: 13px; line-height: 1.5; white-space: pre-wrap; }
    </style>
</head>
<body>
    <div class="container">
        <h1>NAS 高安全媒体加解密工具</h1>
        
        <div class="form-group">
            <label for="targetDir">目标文件夹路径 (容器内路径):</label>
            <input type="text" id="targetDir" value="{{ last_path }}" placeholder="例如: /data/my_folder">
        </div>
        
        <div class="form-group">
            <label for="password">加解密密码:</label>
            <input type="password" id="password" placeholder="请输入高强度密码">
        </div>
        
        <div class="btn-group">
            <button class="btn-encrypt" id="btnEncrypt" onclick="startTask('encrypt')">批量加密</button>
            <button class="btn-decrypt" id="btnDecrypt" onclick="startTask('decrypt')">批量解密</button>
        </div>

        <div class="progress-container" id="progressContainer">
            <div class="progress-bar" id="progressBar"></div>
            <div class="progress-text" id="progressText">0%</div>
        </div>

        <div class="log-container" id="logTerminal">欢迎使用。请选择操作...</div>
    </div>

    <script>
        let eventSource = null;

        function appendLog(msg) {
            const terminal = document.getElementById('logTerminal');
            if (msg) {
                terminal.innerHTML += msg + '\n';
                terminal.scrollTop = terminal.scrollHeight;
            }
        }

        function setButtonsDisabled(disabled) {
            document.getElementById('btnEncrypt').disabled = disabled;
            document.getElementById('btnDecrypt').disabled = disabled;
        }

        function startTask(mode) {
            const targetDir = document.getElementById('targetDir').value;
            const password = document.getElementById('password').value;

            if (!targetDir || !password) {
                alert("路径和密码不能为空！");
                return;
            }

            if (mode === 'encrypt' && !confirm("警告：加密过程将覆盖原文件并修改文件名，是否继续？")) return;

            setButtonsDisabled(true);
            document.getElementById('logTerminal').innerHTML = '';
            document.getElementById('progressContainer').style.display = 'block';
            document.getElementById('progressBar').style.width = '0%';
            document.getElementById('progressText').innerText = '0%';

            fetch('/start', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ target_dir: targetDir, mode: mode, password: password })
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'error') {
                    alert(data.msg);
                    setButtonsDisabled(false);
                } else {
                    listenToLogs();
                }
            })
            .catch(err => {
                alert("请求失败: " + err);
                setButtonsDisabled(false);
            });
        }

        function listenToLogs() {
            if (eventSource) {
                eventSource.close();
            }
            eventSource = new EventSource('/stream');
            eventSource.onmessage = function(event) {
                const data = JSON.parse(event.data);
                
                if (data.msg === "DONE") {
                    eventSource.close();
                    setButtonsDisabled(false);
                    appendLog("\n--- 任务已全部完成 ---");
                    document.getElementById('progressBar').style.width = '100%';
                    document.getElementById('progressText').innerText = '100%';
                    return;
                }

                if (data.msg) {
                    appendLog(data.msg);
                }

                if (data.progress !== undefined) {
                    const pct = data.progress.toFixed(1) + '%';
                    document.getElementById('progressBar').style.width = pct;
                    document.getElementById('progressText').innerText = pct;
                }
            };
        }
    </script>
</body>
</html>
